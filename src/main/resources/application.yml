server:
  port: 8080

# ─── Supabase ────────────────────────────────────────────────────────────────
supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}
  jwt-secret: ${SUPABASE_JWT_SECRET}

# ─── Twilio ──────────────────────────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER}

# ─── Stripe ──────────────────────────────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

# ─── Business Identity (swap these per client) ───────────────────────────────
business:
  name: ${BUSINESS_NAME:Donaldson General Maintenance}
  short-name: ${BUSINESS_SHORT_NAME:DGM}
  owner-phone: ${OWNER_PHONE}
  timezone: ${BUSINESS_TIMEZONE:America/Chicago}
  after-hours-surcharge: ${AFTER_HOURS_SURCHARGE:25.00}
  tagline: ${BUSINESS_TAGLINE:Here when you need us most}

# ─── SpringDoc / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.dgm: INFO
    org.springframework.security: WARN

# ─── Actuator (Railway health check uses /actuator/health) ───────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
